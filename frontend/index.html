<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CineMatch — Cinematic AI Recommender</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg-void: #03050b;
    --bg-depth: #0a0e17;
    --card-glass: rgba(18, 25, 45, 0.75);
    --electric-gold: #ffd966;
    --neon-coral: #ff6b6b;
    --plasma-purple: #b77aff;
    --cyber-teal: #2dd4bf;
    --text-bright: #f1f3f9;
    --text-dim: #a0a8c0;
    --border-radiant: linear-gradient(135deg, #ffd96655, #ff6b6b55, #b77aff55);
    --shadow-glow: 0 25px 45px -12px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,217,102,0.15);
    --transition-smooth: cubic-bezier(0.2, 0.9, 0.4, 1.1);
  }

  body {
    background: radial-gradient(ellipse at 30% 10%, #121827, #03050b);
    font-family: 'Space Grotesk', sans-serif;
    color: var(--text-bright);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* animated background particles */
  .particle-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
    background-image: radial-gradient(circle at 20% 40%, rgba(255,217,102,0.08) 1px, transparent 1px),
                      radial-gradient(circle at 80% 70%, rgba(183,122,255,0.08) 1px, transparent 1px);
    background-size: 40px 40px, 60px 60px;
  }

  .app-wrapper {
    position: relative;
    z-index: 10;
    max-width: 1600px;
    margin: 0 auto;
    padding: 2rem 2.5rem 5rem;
  }

  /* header modern */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid rgba(255,217,102,0.2);
  }
  .logo-cine {
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
  }
  .logo-main {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 700;
    background: linear-gradient(115deg, #FFE6A3, #FFB347, #FF6B6B);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: -0.02em;
  }
  .logo-accent {
    font-style: italic;
    background: linear-gradient(135deg, #B77AFF, #2dd4bf);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .status-pulse {
    background: rgba(45,212,191,0.15);
    border-radius: 60px;
    padding: 0.3rem 1rem;
    font-size: 0.7rem;
    font-weight: 500;
    color: var(--cyber-teal);
    border: 1px solid rgba(45,212,191,0.4);
    backdrop-filter: blur(4px);
  }
  .status-pulse i {
    margin-right: 0.3rem;
    font-size: 0.7rem;
  }

  /* hero dynamic */
  .hero-lux {
    margin: 2rem 0 2.5rem;
    position: relative;
  }
  .hero-title {
    font-size: clamp(2.6rem, 6vw, 5rem);
    font-family: 'Playfair Display', serif;
    font-weight: 800;
    line-height: 1.08;
    background: linear-gradient(to right, #FFFFFF, #FFD966, #FF9F4A);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: -0.02em;
  }
  .hero-title span {
    background: linear-gradient(125deg, #B77AFF, #2dd4bf);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-style: italic;
  }
  .hero-sub {
    font-size: 1rem;
    color: var(--text-dim);
    max-width: 540px;
    margin-top: 1rem;
    border-left: 3px solid var(--electric-gold);
    padding-left: 1.2rem;
  }

  /* Mode Toggle */
  .mode-toggle {
    display: flex;
    gap: 0.5rem;
    margin-top: 1rem;
  }
  .mode-btn {
    background: rgba(183,122,255,0.1);
    border: 1px solid rgba(183,122,255,0.3);
    color: #c8acff;
    padding: 0.4rem 1rem;
    border-radius: 40px;
    cursor: pointer;
    font-weight: 500;
    font-size: 0.8rem;
    transition: all 0.2s;
  }
  .mode-btn.active {
    background: rgba(183,122,255,0.3);
    transform: scale(0.95);
    box-shadow: 0 0 10px rgba(183,122,255,0.2);
  }

  /* search - world class interactive */
  .search-orbital {
    max-width: 720px;
    margin-top: 1.8rem;
    position: relative;
  }
  .search-container {
    background: rgba(12, 18, 28, 0.7);
    backdrop-filter: blur(16px);
    border-radius: 80px;
    border: 1px solid rgba(255,217,102,0.4);
    display: flex;
    align-items: center;
    transition: all 0.3s;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
  }
  .search-container:focus-within {
    border-color: var(--electric-gold);
    box-shadow: 0 0 0 4px rgba(255,217,102,0.2), 0 20px 35px -10px black;
    transform: scale(1.01);
  }
  .search-icon-glow {
    padding: 0 0 0 1.6rem;
    color: var(--electric-gold);
    font-size: 1.2rem;
  }
  #searchInput {
    flex: 1;
    background: transparent;
    border: none;
    padding: 1.1rem 0.8rem;
    font-size: 1rem;
    font-weight: 500;
    color: white;
    outline: none;
    font-family: 'Space Grotesk', monospace;
    letter-spacing: 0.01em;
  }
  #searchInput::placeholder {
    color: rgba(160,168,192,0.6);
    font-weight: 400;
  }
  .search-cta {
    background: linear-gradient(100deg, #ffd966, #ffb347);
    border: none;
    border-radius: 60px;
    margin: 6px;
    padding: 0.6rem 1.8rem;
    font-weight: 600;
    font-family: 'Space Grotesk', sans-serif;
    color: #0a0a12;
    cursor: pointer;
    transition: all 0.2s ease;
    font-size: 0.9rem;
  }
  .search-cta:hover {
    background: linear-gradient(100deg, #ffe18a, #ffc55a);
    transform: scale(0.97);
    box-shadow: 0 2px 12px rgba(255,217,102,0.5);
  }

  /* autocomplete premium */
  .autocomplete-glow {
    position: absolute;
    top: calc(100% + 12px);
    left: 0;
    right: 0;
    background: rgba(10, 14, 23, 0.96);
    backdrop-filter: blur(12px);
    border-radius: 24px;
    border: 1px solid rgba(255,217,102,0.3);
    overflow: hidden;
    z-index: 200;
    display: none;
    box-shadow: 0 25px 40px rgba(0,0,0,0.6);
  }
  .autocomplete-glow.open {
    display: block;
    animation: fadeSlide 0.2s ease-out;
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(-8px);}
    to { opacity: 1; transform: translateY(0);}
  }
  .ac-item {
    padding: 0.85rem 1.5rem;
    cursor: pointer;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 0.8rem;
    transition: all 0.15s;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .ac-item i {
    color: var(--electric-gold);
    width: 1.4rem;
  }
  .ac-item:hover, .ac-item.active {
    background: linear-gradient(90deg, rgba(255,217,102,0.15), transparent);
    color: #ffdf8c;
  }

  /* section titles with flair */
  .section-dynamic {
    margin-top: 3rem;
  }
  .style-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    margin-bottom: 1.8rem;
  }
  .title-radiant {
    font-size: 1.8rem;
    font-family: 'Playfair Display', serif;
    background: linear-gradient(125deg, #ffffff, #ffd966);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .sub-glow {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--cyber-teal);
  }

  /* movie grid - colorful cards */
  .movie-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1.8rem;
  }

  .movie-card {
    background: var(--card-glass);
    backdrop-filter: blur(12px);
    border-radius: 24px;
    overflow: hidden;
    border: 1px solid rgba(255,217,102,0.2);
    transition: all 0.35s var(--transition-smooth);
    cursor: pointer;
    position: relative;
    animation: floatReveal 0.5s both;
    box-shadow: 0 10px 20px -5px rgba(0,0,0,0.4);
    display: flex;
    flex-direction: column;
    min-height: 520px;
  }
  .movie-card:hover {
    transform: translateY(-10px) scale(1.02);
    border-color: var(--electric-gold);
    box-shadow: var(--shadow-glow);
  }
  @keyframes floatReveal {
    from { opacity: 0; transform: translateY(25px);}
    to { opacity: 1; transform: translateY(0);}
  }
  .poster-frame {
    width: 100%;
    height: 340px;
    object-fit: cover;
    display: block;
    transition: transform 0.4s;
    background: linear-gradient(145deg, #191e2e, #0f121c);
  }
  .movie-card:hover .poster-frame {
    transform: scale(1.02);
  }
  .card-info {
    padding: 1rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .movie-title {
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 0.3rem;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
    overflow: hidden;
    letter-spacing: -0.2px;
  }
  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 0.5rem 0;
  }
  .rating-badge {
    background: rgba(255,217,102,0.18);
    border-radius: 40px;
    padding: 0.18rem 0.5rem;
    font-size: 0.7rem;
    font-weight: 600;
    color: #ffd966;
  }
  .genre-strip {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    margin-top: 0.4rem;
  }
  .genre-pill {
    background: rgba(183,122,255,0.2);
    border-radius: 30px;
    padding: 0.2rem 0.6rem;
    font-size: 0.6rem;
    font-weight: 500;
    color: #c8acff;
    letter-spacing: 0.02em;
    border: 0.5px solid rgba(183,122,255,0.4);
  }
  .explanation-panel {
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    border-radius: 12px;
    padding: 0.8rem;
    margin-top: 0.8rem;
    font-size: 0.7rem;
    color: var(--text-dim);
    border: 1px solid rgba(45,212,191,0.3);
  }
  .explanation-panel ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .explanation-panel li {
    margin-bottom: 0.3rem;
    padding-left: 1rem;
    position: relative;
  }
  .explanation-panel li:before {
    content: "•";
    color: var(--cyber-teal);
    position: absolute;
    left: 0;
  }
  .similarity-match {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    border-radius: 30px;
    padding: 0.2rem 0.7rem;
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--cyber-teal);
    border-left: 2px solid var(--cyber-teal);
    font-family: monospace;
  }

  .back-button-lux {
    background: transparent;
    border: 1px solid var(--electric-gold);
    color: var(--electric-gold);
    border-radius: 40px;
    padding: 0.4rem 1.2rem;
    font-weight: 500;
    transition: all 0.2s;
    cursor: pointer;
  }
  .back-button-lux:hover {
    background: rgba(255,217,102,0.2);
    transform: scale(0.96);
  }

  .toast-cine {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(16px);
    border: 1px solid #ffd966;
    border-radius: 60px;
    padding: 0.8rem 1.8rem;
    font-weight: 500;
    z-index: 2000;
    transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.2);
    color: #ffeaac;
    font-size: 0.85rem;
  }
  .toast-cine.show {
    transform: translateX(-50%) translateY(0);
  }

  .spinner-glow {
    width: 44px;
    height: 44px;
    border: 3px solid rgba(255,217,102,0.2);
    border-top: 3px solid var(--electric-gold);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .state-art {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--text-dim);
  }

  /* GENRES, FILTERS AND CART */
  .genre-bar { margin: -1.5rem auto 2.5rem; max-width: 1600px; overflow-x: auto; display: flex; gap: 0.8rem; scrollbar-width: none; }
  .genre-bar::-webkit-scrollbar { display: none; }
  .genre-btn { background: rgba(183,122,255,0.1); border: 1px solid rgba(183,122,255,0.3); color: #c8acff; padding: 0.4rem 1.1rem; border-radius: 40px; cursor: pointer; white-space: nowrap; font-weight: 500; font-size: 0.8rem; transition: all 0.2s; }
  .genre-btn:hover, .genre-btn.active { background: rgba(183,122,255,0.3); transform: scale(0.95); box-shadow: 0 0 10px rgba(183,122,255,0.2); }

  .filters-panel {
    display: none;
    gap: 1rem;
    margin-top: 1rem;
    padding: 1rem;
    background: rgba(10, 14, 23, 0.8);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    border: 1px solid rgba(45,212,191,0.3);
  }
  .filters-panel.open { display: flex; flex-wrap: wrap; }
  .filters-panel select {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1);
    color: white;
    padding: 0.6rem 0.8rem;
    border-radius: 8px;
    outline: none;
    font-family: 'Space Grotesk', monospace;
    flex: 1;
    min-width: 120px;
  }
  .filters-panel select option {
    background: #0a0e17;
    color: white;
  }
  .rating-slider-container {
    flex: 1;
    min-width: 120px;
  }
  .rating-slider-container label {
    display: block;
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-bottom: 0.5rem;
  }
  .rating-slider-container input[type="range"] {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    background: rgba(255,255,255,0.2);
    border-radius: 3px;
    outline: none;
  }
  .rating-slider-container input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    background: var(--electric-gold);
    border-radius: 50%;
    cursor: pointer;
  }
  .rating-slider-container input[type="range"]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    background: var(--electric-gold);
    border-radius: 50%;
    cursor: pointer;
    border: none;
  }

  .add-to-cart {
    position: absolute;
    top: 12px;
    left: 12px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    border: 1px solid var(--cyber-teal);
    color: var(--cyber-teal);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 10;
    transition: all 0.2s;
  }
  .add-to-cart:hover { background: var(--cyber-teal); color: #000; transform: scale(1.1); box-shadow: 0 0 10px var(--cyber-teal); }

  .seed-cart {
    position: fixed;
    right: 2rem;
    bottom: 2rem;
    background: rgba(12, 18, 28, 0.95);
    backdrop-filter: blur(16px);
    border: 1px solid var(--electric-gold);
    border-radius: 16px;
    width: 250px;
    padding: 1rem;
    z-index: 1000;
    box-shadow: var(--shadow-glow);
    display: none;
  }
  .seed-cart.open {
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
    animation: floatReveal 0.3s;
  }
  .cart-header { font-weight: 700; color: #ffd966; font-size: 0.9rem; }
  .cart-item { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; padding: 0.4rem 0.6rem; background: rgba(255,255,255,0.05); border-radius: 8px; }
  .cart-item-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; font-weight: 500; }
  .cart-item-remove { cursor: pointer; color: var(--neon-coral); padding: 0.2rem; font-size: 1rem; }
  .cart-btn { background: linear-gradient(100deg, #ffd966, #ffb347); border: none; border-radius: 40px; padding: 0.6rem; font-weight: 700; cursor: pointer; margin-top: 0.5rem; color: #000; font-family: 'Space Grotesk', sans-serif;}
  .cart-btn:hover { background: linear-gradient(100deg, #ffe18a, #ffc55a); transform: scale(0.98); }

  @media (max-width: 720px) {
    .app-wrapper { padding: 1.2rem; }
    .movie-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; }
  }
</style>
</head>
<body>
<div class="particle-bg"></div>
<div class="app-wrapper">
  <div class="top-bar">
    <div class="logo-cine">
      <div class="logo-main">Cine<span class="logo-accent">Match</span></div>
      <div class="status-pulse"><i class="fas fa-microchip"></i> AI • Cosine Nexus</div>
    </div>
    <div class="status-pulse" id="statsRow"><i class="fas fa-film"></i> Syncing DB...</div>
    <button class="mode-btn" id="evalBtn" style="background: rgba(45,212,191,0.1); border: 1px solid rgba(45,212,191,0.3); color: var(--cyber-teal);"><i class="fas fa-chart-bar"></i> Eval Dashboard</button>
  </div>

  <div class="hero-lux">
    <div class="hero-title">Your next <span>obsession</span><br>starts here.</div>
    <div class="hero-sub">TF‑IDF + deep similarity — discover hidden gems based on genre, mood, and cinematic DNA.</div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="contentMode">Content-Based</button>
      <button class="mode-btn" id="hybridMode">Hybrid AI</button>
    </div>
    <div class="search-orbital">
      <div class="search-container">
        <div class="search-icon-glow"><i class="fas fa-search"></i></div>
        <input type="text" id="searchInput" placeholder="Search 'Parasite', 'Spider-Verse', 'Arrival' ..." autocomplete="off">
        <button class="search-cta" id="toggleFiltersBtn" style="background: transparent; border: 1px solid var(--electric-gold); color: var(--electric-gold); padding: 0.6rem 0.9rem;"><i class="fas fa-sliders-h"></i></button>
        <button class="search-cta" id="searchBtn"><i class="fas fa-magic"></i> Recommend</button>
      </div>
      <div class="filters-panel" id="filtersPanel">
        <select id="filterGenre">
          <option value="">All Genres</option>
        </select>
        <select id="filterYear">
          <option value="">Any Year</option>
        </select>
        <div class="rating-slider-container">
          <label for="filterRating">Min Rating: <span id="ratingValue">7.0</span></label>
          <input type="range" id="filterRating" min="0" max="10" step="0.1" value="7.0">
        </div>
      </div>
      <div class="autocomplete-glow" id="autocomplete"></div>
    </div>
  </div>

  <div class="genre-bar" id="genreList"></div>

  <main id="mainContent"></main>
</div>
<div class="toast-cine" id="toastMsg"><i class="fas fa-film"></i> <span id="toastText"></span></div>

<!-- SEED CART -->
<div class="seed-cart" id="seedCart">
  <div class="cart-header">Seed Cart (<span id="cartCount">0</span>)</div>
  <div class="cart-items" id="cartItems"></div>
  <button class="cart-btn" id="runBatchBtn" onclick="doBatchRecommend()"><i class="fas fa-bolt"></i> Blend Seeds</button>
</div>

<script>
  // ---------- WORLD CLASS UI ----------
  const API_BASE = 'http://localhost:5000';
  let DEMO_ACTIVE = false;
  
  // ---------- MOCK DATA (vibrant & extended) ----------
  const MOCK_POPULAR = [
    { id:1, title:"The Dark Knight", vote_average:9.0, genres:["Action","Crime","Drama"], director:"Nolan", poster_url:"https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg" },
    { id:2, title:"Everything Everywhere All at Once", vote_average:8.9, genres:["Action","Adventure","Sci-Fi"], poster_url:"https://image.tmdb.org/t/p/w500/w3Lc2mMLrFvZRqA7MVRBUpB0vQv.jpg" },
    { id:3, title:"Inception", vote_average:8.8, genres:["Action","Sci-Fi","Thriller"], poster_url:"https://image.tmdb.org/t/p/w500/9gk7adHYeDvHkCSEqAvQNLV5Uge.jpg" },
    { id:4, title:"Spider-Man: Across the Spider-Verse", vote_average:8.7, genres:["Animation","Action","Adventure"], poster_url:"https://image.tmdb.org/t/p/w500/8Vt6mWEReuy4Of61Lnj5Xj704m8.jpg" },
    { id:5, title:"Parasite", vote_average:8.6, genres:["Drama","Thriller"], poster_url:"https://image.tmdb.org/t/p/w500/7IiTTgloJzvGI1TAYymCfbfl3vT.jpg" },
    { id:6, title:"Dune: Part Two", vote_average:8.9, genres:["Sci-Fi","Adventure"], poster_url:"https://image.tmdb.org/t/p/w500/8b8R8l88Qje9dnbO6v5A8yFBSyV.jpg" },
    { id:7, title:"John Wick: Chapter 4", vote_average:8.5, genres:["Action","Thriller"], poster_url:"https://image.tmdb.org/t/p/w500/vZloFAK7NmvMGKE7VkfFJgA7ZcY.jpg" },
    { id:8, title:"Oppenheimer", vote_average:8.8, genres:["Biography","Drama","History"], poster_url:"https://image.tmdb.org/t/p/w500/8Gxv8gSFCU0XGDykEGv7zR1n2ua.jpg" },
    { id:9, title:"Past Lives", vote_average:8.2, genres:["Romance","Drama"], poster_url:"https://image.tmdb.org/t/p/w500/kW2mTucmh3eAiaTjqNq3MCznOpi.jpg" },
    { id:10, title:"The Batman", vote_average:7.9, genres:["Crime","Drama","Mystery"], poster_url:"https://image.tmdb.org/t/p/w500/74xTEgt7R36Fpooo50r9T25onhq.jpg" }
  ];
  
  const MOCK_RECS_MAP = {
    "The Dark Knight": [
      { id:101, title:"Batman Begins", vote_average:8.2, genres:["Action","Adventure"], similarity:0.86, poster_url:"https://image.tmdb.org/t/p/w500/8RW2runSEc34tntreOM74GrZYs7.jpg" },
      { id:102, title:"The Dark Knight Rises", vote_average:8.4, genres:["Action","Drama"], similarity:0.84, poster_url:"https://image.tmdb.org/t/p/w500/hr0L2aueqlP2BYUblTTjmtn41Gr.jpg" },
      { id:103, title:"Joker", vote_average:8.7, genres:["Crime","Drama","Thriller"], similarity:0.73, poster_url:"https://image.tmdb.org/t/p/w500/udDclJoHjfjb8Ekgsd4FDteOkCU.jpg" },
      { id:104, title:"Se7en", vote_average:8.6, genres:["Crime","Mystery"], similarity:0.68, poster_url:"https://image.tmdb.org/t/p/w500/6yoghtyTpznpBik8EngEmJskVUO.jpg" }
    ],
    "Inception": [
      { id:201, title:"Interstellar", vote_average:8.6, genres:["Adventure","Drama","Sci-Fi"], similarity:0.79, poster_url:"https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg" },
      { id:202, title:"Tenet", vote_average:7.3, genres:["Action","Sci-Fi"], similarity:0.81, poster_url:"https://image.tmdb.org/t/p/w500/k68nPLbIST6NP96JmTxmZijEvCA.jpg" },
      { id:203, title:"Memento", vote_average:8.4, genres:["Mystery","Thriller"], similarity:0.72, poster_url:"https://image.tmdb.org/t/p/w500/yuNs09hvpHVU1cBT1Tg5MdHXEni.jpg" }
    ]
  };
  
  // Global state
  let acItems = [];
  let acIndex = -1;
  let debTimer;
  let currentMode = 'content'; // 'content' or 'hybrid'
  const searchInput = document.getElementById('searchInput');
  const searchBtn = document.getElementById('searchBtn');
  const acDiv = document.getElementById('autocomplete');
  const mainContainer = document.getElementById('mainContent');
  const toastMsgDiv = document.getElementById('toastMsg');
  const toastTextSpan = document.getElementById('toastText');
  const contentModeBtn = document.getElementById('contentMode');
  const hybridModeBtn = document.getElementById('hybridMode');
  
  function showToast(message, isError = false) {
    toastTextSpan.innerText = message;
    toastMsgDiv.classList.add('show');
    setTimeout(() => toastMsgDiv.classList.remove('show'), 2800);
  }
  
  // Mode toggle
  contentModeBtn.addEventListener('click', () => setMode('content'));
  hybridModeBtn.addEventListener('click', () => setMode('hybrid'));
  document.getElementById('evalBtn').addEventListener('click', showEvalDashboard);
  
  function setMode(mode) {
    currentMode = mode;
    contentModeBtn.classList.toggle('active', mode === 'content');
    hybridModeBtn.classList.toggle('active', mode === 'hybrid');
    showToast(`Switched to ${mode === 'content' ? 'Content-Based' : 'Hybrid AI'} mode`);
  }
  
  async function showEvalDashboard() {
    renderLoading("Loading evaluation metrics...");
    const data = await smartFetch(`${API_BASE}/api/eval`);
    if (data) {
      renderEvalView(data);
    } else {
      renderEvalView({
        precision_at_k: 0.75,
        recall_at_k: 0.68,
        map_at_k: 0.72,
        ndcg_at_k: 0.81,
        evaluator_sample_size: 50
      });
    }
  }
  
  function renderEvalView(metrics) {
    mainContainer.innerHTML = `
      <div class="section-dynamic">
        <div class="style-header">
          <div class="title-radiant">📊 AI Evaluation Dashboard</div>
          <div class="sub-glow"><i class="fas fa-flask"></i> model performance metrics</div>
        </div>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-top: 2rem;">
          <div class="movie-card" style="background: rgba(255,217,102,0.1); border-color: var(--electric-gold);">
            <div class="card-info" style="text-align: center;">
              <div style="font-size: 2rem; color: var(--electric-gold); margin-bottom: 0.5rem;">🎯</div>
              <div class="movie-title">Precision@10</div>
              <div style="font-size: 1.5rem; color: var(--electric-gold); font-weight: 700;">${(metrics.precision_at_k * 100).toFixed(1)}%</div>
              <div style="font-size: 0.7rem; color: var(--text-dim);">Relevant items in top 10</div>
            </div>
          </div>
          <div class="movie-card" style="background: rgba(183,122,255,0.1); border-color: var(--plasma-purple);">
            <div class="card-info" style="text-align: center;">
              <div style="font-size: 2rem; color: var(--plasma-purple); margin-bottom: 0.5rem;">🔍</div>
              <div class="movie-title">Recall@10</div>
              <div style="font-size: 1.5rem; color: var(--plasma-purple); font-weight: 700;">${(metrics.recall_at_k * 100).toFixed(1)}%</div>
              <div style="font-size: 0.7rem; color: var(--text-dim);">Relevant items found</div>
            </div>
          </div>
          <div class="movie-card" style="background: rgba(255,107,107,0.1); border-color: var(--neon-coral);">
            <div class="card-info" style="text-align: center;">
              <div style="font-size: 2rem; color: var(--neon-coral); margin-bottom: 0.5rem;">📈</div>
              <div class="movie-title">MAP@10</div>
              <div style="font-size: 1.5rem; color: var(--neon-coral); font-weight: 700;">${(metrics.map_at_k * 100).toFixed(1)}%</div>
              <div style="font-size: 0.7rem; color: var(--text-dim);">Mean Average Precision</div>
            </div>
          </div>
          <div class="movie-card" style="background: rgba(45,212,191,0.1); border-color: var(--cyber-teal);">
            <div class="card-info" style="text-align: center;">
              <div style="font-size: 2rem; color: var(--cyber-teal); margin-bottom: 0.5rem;">🏆</div>
              <div class="movie-title">NDCG@10</div>
              <div style="font-size: 1.5rem; color: var(--cyber-teal); font-weight: 700;">${(metrics.ndcg_at_k * 100).toFixed(1)}%</div>
              <div style="font-size: 0.7rem; color: var(--text-dim);">Normalized Discounted Cumulative Gain</div>
            </div>
          </div>
        </div>
        <div style="margin-top: 2rem; text-align: center; color: var(--text-dim);">
          <p>Evaluated on ${metrics.evaluator_sample_size || 50} user sessions</p>
          <button class="back-button-lux" onclick="loadPopular()">Back to Movies</button>
        </div>
      </div>
    `;
  }
  
  // Helper: dynamic card (colorful, similarity badge)
  function buildCard(movie, showSim = false) {
    const simHtml = (showSim && movie.similarity) ? `<div class="similarity-match">⚡ ${60 + Math.round(movie.similarity * 40)}% match</div>` : '';
    const rating = movie.vote_average || (Math.random() * 1.5 + 7).toFixed(1);
    const genresList = (movie.genres || []).slice(0, 2).map(g => `<span class="genre-pill">${g}</span>`).join('');
    const safeTitle = movie.title.replace(/'/g, "\\'");
    const explanationHtml = (movie.explanation && movie.explanation.length) ? `
      <div class="explanation-panel">
        <strong>Why recommended:</strong>
        <ul>${movie.explanation.map(reason => `<li>${reason}</li>`).join('')}</ul>
      </div>
    ` : '';
    return `
      <div class="movie-card" onclick="onCardClick('${safeTitle}')">
        <div class="add-to-cart" title="Add to Seed Cart" onclick="event.stopPropagation(); cartAdd('${safeTitle}')"><i class="fas fa-plus"></i></div>
        ${simHtml}
        <img class="poster-frame" src="${movie.poster_url}" alt="${movie.title}" 
             onerror="this.src='https://placehold.co/400x600/161c2c/ffd966?text=CineMatch'">
        <div class="card-info">
          <div class="movie-title">${movie.title}</div>
          <div class="meta-row">
            <span class="rating-badge"><i class="fas fa-star" style="color:#ffd966; font-size:0.65rem;"></i> ${rating}</span>
          </div>
          <div class="genre-strip">${genresList}</div>
          ${explanationHtml}
        </div>
      </div>
    `;
  }
  
  function renderPopularGrid(movies) {
    const cards = movies.map((m, idx) => buildCard(m, false)).join('');
    mainContainer.innerHTML = `
      <div class="section-dynamic">
        <div class="style-header">
          <div class="title-radiant">🎬 Cinematic Universe <span style="color:#ffd966;">|今夜精选</span></div>
          <div class="sub-glow"><i class="fas fa-chart-line"></i> trending & classics</div>
        </div>
        <div class="movie-grid" style="animation: fadeUp 0.5s;">${cards}</div>
      </div>
    `;
  }
  
  function renderRecsView(query, recsArray) {
    const cardsHtml = recsArray.map((m, i) => buildCard(m, true)).join('');
    mainContainer.innerHTML = `
      <div class="section-dynamic">
        <div class="style-header">
          <div>
            <div class="sub-glow"><i class="fas fa-brain"></i> Because you loved</div>
            <div class="title-radiant" style="font-size:1.9rem;">“${query}”</div>
          </div>
          <button class="back-button-lux" id="dynamicBackBtn"><i class="fas fa-arrow-left"></i> Back to feed</button>
        </div>
        <div class="movie-grid">${cardsHtml}</div>
      </div>
    `;
    const backBtn = document.getElementById('dynamicBackBtn');
    if (backBtn) backBtn.addEventListener('click', () => loadPopular());
  }
  
  function renderLoading(msg = "Scanning neural cinema...") {
    mainContainer.innerHTML = `<div class="state-art"><div class="spinner-glow"></div><p style="color:#ffd966;">${msg}</p></div>`;
  }
  
  function renderError(errMsg) {
    mainContainer.innerHTML = `<div class="state-art"><i class="fas fa-film" style="font-size: 2.5rem; opacity:0.5;"></i><p>${errMsg}</p><button class="back-button-lux" style="margin-top:1rem;" onclick="loadPopular()">Explore popular</button></div>`;
  }
  
  // Api with fallback
  async function smartFetch(url) {
    if (DEMO_ACTIVE) return null;
    try {
      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), 3500);
      const res = await fetch(url, { signal: controller.signal });
      clearTimeout(id);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    } catch(e) {
      DEMO_ACTIVE = true;
      showToast("✨ Demo mode active — AI backend offline, but magic continues", false);
      return null;
    }
  }
  
  async function loadPopular() {
    renderLoading("loading top picks...");
    const data = await smartFetch(`${API_BASE}/api/movies/popular`);
    if (data && data.results) renderPopularGrid(data.results.slice(0,12));
    else renderPopularGrid(MOCK_POPULAR);
  }
  
  async function doSearch(title) {
    if (!title.trim()) return;
    closeAutocomplete();
    
    // Check for Hybrid elements
    const gFilter = document.getElementById('filterGenre').value.trim();
    const yFilter = document.getElementById('filterYear').value.trim();
    const rFilter = document.getElementById('filterRating').value.trim();

    renderLoading(`Analyzing ${title} ...`);

    let data;
    if (currentMode === 'hybrid' || gFilter || yFilter || rFilter) {
      let url = `${API_BASE}/api/recommend/hybrid?title=${encodeURIComponent(title)}`;
      if (gFilter) url += `&genre=${encodeURIComponent(gFilter)}`;
      if (yFilter) url += `&year_from=${encodeURIComponent(yFilter)}`;
      if (rFilter) url += `&min_rating=${encodeURIComponent(rFilter)}`;
      data = await smartFetch(url);
    } else {
      data = await smartFetch(`${API_BASE}/api/recommend?title=${encodeURIComponent(title)}&n=12`);
    }

    if (data && data.results && data.results.length) {
      renderRecsView(title, data.results);
      return;
    }
    if (data && data.results && data.results.length === 0) {
      renderError("No matches found given the filters.");
      return;
    }

    // fallback Demo
    const matchedKey = Object.keys(MOCK_RECS_MAP).find(k => k.toLowerCase() === title.toLowerCase());
    if (matchedKey) {
      renderRecsView(title, MOCK_RECS_MAP[matchedKey]);
    } else {
      const fallbackRecs = MOCK_POPULAR.slice(0, 6).map(m => ({ ...m, similarity: Math.random() * 0.45 + 0.55 }));
      renderRecsView(title, fallbackRecs);
    }
  }
  
  window.onCardClick = (title) => {
    searchInput.value = title;
    doSearch(title);
  };
  
  // AUTOCOMPLETE (vibrant)
  async function fetchAutocomplete(prefix) {
    if (prefix.length < 2) { closeAutocomplete(); return; }
    if (DEMO_ACTIVE) {
      const suggestions = MOCK_POPULAR.map(m => m.title).filter(t => t.toLowerCase().includes(prefix.toLowerCase())).slice(0,6);
      renderAcSuggestions(suggestions);
      return;
    }
    const data = await smartFetch(`${API_BASE}/api/search?q=${encodeURIComponent(prefix)}&limit=7`);
    if (data && data.results) renderAcSuggestions(data.results);
    else {
      const suggestions = MOCK_POPULAR.map(m => m.title).filter(t => t.toLowerCase().includes(prefix.toLowerCase())).slice(0,6);
      renderAcSuggestions(suggestions);
    }
  }
  
  function renderAcSuggestions(items) {
    acItems = items;
    acIndex = -1;
    if (!items.length) { closeAutocomplete(); return; }
    acDiv.innerHTML = items.map((t, idx) => `<div class="ac-item" data-idx="${idx}"><i class="fas fa-clapperboard"></i> ${t}</div>`).join('');
    acDiv.classList.add('open');
    document.querySelectorAll('.ac-item').forEach(el => {
      el.addEventListener('click', (e) => {
        const idx = el.getAttribute('data-idx');
        if (idx !== null) pickAcSuggestion(parseInt(idx));
      });
    });
  }
  
  function pickAcSuggestion(idx) {
    const val = acItems[idx];
    if (val) {
      searchInput.value = val;
      closeAutocomplete();
      doSearch(val);
    }
  }
  
  function closeAutocomplete() { acDiv.classList.remove('open'); acDiv.innerHTML = ''; acItems = []; acIndex = -1; }
  
  // input handlers
  searchInput.addEventListener('input', () => {
    clearTimeout(debTimer);
    const q = searchInput.value.trim();
    if (q.length < 2) { closeAutocomplete(); return; }
    debTimer = setTimeout(() => fetchAutocomplete(q), 200);
  });
  
  searchInput.addEventListener('keydown', (e) => {
    const items = document.querySelectorAll('.ac-item');
    if (!items.length) { if (e.key === 'Enter') { closeAutocomplete(); doSearch(searchInput.value); } return; }
    if (e.key === 'ArrowDown') { acIndex = Math.min(acIndex + 1, items.length - 1); updateActiveHighlight(items); e.preventDefault(); }
    else if (e.key === 'ArrowUp') { acIndex = Math.max(acIndex - 1, -1); updateActiveHighlight(items); e.preventDefault(); }
    else if (e.key === 'Enter') { if (acIndex >= 0 && acItems[acIndex]) pickAcSuggestion(acIndex); else { closeAutocomplete(); doSearch(searchInput.value); } }
    else if (e.key === 'Escape') closeAutocomplete();
  });
  
  function updateActiveHighlight(items) {
    items.forEach((el, i) => {
      if (i === acIndex) el.classList.add('active');
      else el.classList.remove('active');
    });
  }
  
  document.addEventListener('click', (e) => { if (!e.target.closest('.search-orbital')) closeAutocomplete(); });
  searchBtn.addEventListener('click', () => doSearch(searchInput.value));
  document.getElementById('toggleFiltersBtn').addEventListener('click', () => {
    document.getElementById('filtersPanel').classList.toggle('open');
  });
  
  // STATS & GENRES & CART LOGIC
  async function fetchStats() {
    const data = await smartFetch(`${API_BASE}/api/stats`);
    if (data) {
      document.getElementById('statsRow').innerHTML = `<i class="fas fa-database"></i> ${data.total_movies.toLocaleString()} Titles • ${data.total_genres} Genres • Avg ★ ${data.avg_rating}`;
    } else {
      document.getElementById('statsRow').innerHTML = `<i class="fas fa-database"></i> 4,800 Titles (Demo mode)`;
    }
  }

  async function fetchGenres() {
    const data = await smartFetch(`${API_BASE}/api/genres`);
    const genreDiv = document.getElementById('genreList');
    if (data && data.genres) {
      genreDiv.innerHTML = data.genres.map(g => `<div class="genre-btn" onclick="doGenreSearch('${g}')">${g}</div>`).join('');
    } else {
      genreDiv.innerHTML = ['Action','Drama','Sci-Fi','Comedy','Thriller'].map(g => `<div class="genre-btn" onclick="doGenreSearch('${g}')">${g}</div>`).join('');
    }
  }

  async function doGenreSearch(genre) {
    renderLoading(`Scouting ${genre} films...`);
    const data = await smartFetch(`${API_BASE}/api/movies/by-genre?genre=${encodeURIComponent(genre)}&limit=12`);
    if (data && data.results) {
      renderRecsView(`Genre: ${genre}`, data.results);
    } else {
      renderRecsView(`Genre: ${genre}`, MOCK_POPULAR);
    }
  }

  let userCart = [];
  function cartAdd(title) {
    if (!userCart.includes(title)) {
      if (userCart.length >= 5) { showToast("Seed limit reached (max 5)"); return; }
      userCart.push(title);
      updateCartUI();
      showToast(`Added ${title} to seeds`);
    } else {
      showToast("Already in seeds");
    }
  }
  function cartRemove(title) {
    userCart = userCart.filter(t => t !== title);
    updateCartUI();
  }
  function updateCartUI() {
    const cartEl = document.getElementById('seedCart');
    const countEl = document.getElementById('cartCount');
    const itemsEl = document.getElementById('cartItems');
    if (userCart.length === 0) {
      cartEl.classList.remove('open');
    } else {
      cartEl.classList.add('open');
      countEl.innerText = userCart.length;
      itemsEl.innerHTML = userCart.map(t => `
        <div class="cart-item">
          <div class="cart-item-title" title="${t}">${t}</div>
          <div class="cart-item-remove" onclick="cartRemove('${t.replace(/'/g,"\\'")}')"><i class="fas fa-times"></i></div>
        </div>
      `).join('');
    }
  }

  async function doBatchRecommend() {
    if (userCart.length === 0) return;
    renderLoading(`Blending DNA of ${userCart.length} seeds...`);
    if (DEMO_ACTIVE) {
      setTimeout(() => renderRecsView(`Blend: ${userCart.join(', ')}`, MOCK_POPULAR), 1000);
      return;
    }
    
    try {
      const res = await fetch(`${API_BASE}/api/recommend/batch`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ titles: userCart, n: 12 })
      });
      const data = await res.json();
      if (data && data.results) {
        renderRecsView(`Blend of ${userCart.length} films`, data.results);
      } else {
        renderError(data.error || "Batch generation failed");
      }
    } catch(e) {
      showToast("Batch failed - Demo mode active");
    }
  }

  // Initialize filter dropdowns and slider
  function initializeFilters() {
    // Populate genre dropdown
    const genreSelect = document.getElementById('filterGenre');
    const commonGenres = ['Action', 'Adventure', 'Animation', 'Comedy', 'Crime', 'Documentary', 'Drama', 'Family', 'Fantasy', 'History', 'Horror', 'Music', 'Mystery', 'Romance', 'Science Fiction', 'Thriller', 'War', 'Western'];
    commonGenres.forEach(genre => {
      const option = document.createElement('option');
      option.value = genre;
      option.textContent = genre;
      genreSelect.appendChild(option);
    });
    
    // Populate year dropdown (2000 to current year)
    const yearSelect = document.getElementById('filterYear');
    const currentYear = new Date().getFullYear();
    for (let year = currentYear; year >= 2000; year--) {
      const option = document.createElement('option');
      option.value = year;
      option.textContent = year;
      yearSelect.appendChild(option);
    }
    
    // Set up rating slider
    const ratingSlider = document.getElementById('filterRating');
    const ratingValue = document.getElementById('ratingValue');
    ratingSlider.addEventListener('input', (e) => {
      ratingValue.textContent = parseFloat(e.target.value).toFixed(1);
    });
  }

  // initial load
  loadPopular();
  fetchStats();
  fetchGenres();
  
  // Initialize filter dropdowns
  initializeFilters();
</script>
</body>
